<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/htmx.org/dist/htmx.js"></script>
    <link href="/static/output.css" type="text/css" rel="stylesheet" />
    <title>{{.Title}}</title>
  </head>
  <body class="bg-slate-50 text-slate-900 font-geist">
    <main class="mx-auto max-w-3xl px-6 py-12">
      <a class="text-sm text-slate-500 hover:text-slate-700" href="/">← Back home</a>
      <h1 class="mt-4 text-4xl font-semibold tracking-tight">{{.Title}}</h1>
      <p class="mt-2 text-sm text-slate-500">{{.Published}}</p>
      <article class="mt-8">
        {{.Content}}
      </article>
    </main>
  </body>
</html>
