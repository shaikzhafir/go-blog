{{define "blogEntry"}}
<li class="group">
  <a href="/reviews/{{.Slug}}" class="block">
    <span class="text-base font-medium text-ink group-hover:text-terra transition-colors duration-150">{{.Title}}</span>
    <time class="block mt-0.5 text-sm text-ink-muted">{{.PublishedStr}}</time>
  </a>
</li>
{{end}}
