{{define "blogEntry"}}
<li class="group">
  <a href="/reviews/{{.Slug}}" class="block">
    <span class="text-base font-medium text-slate-900 group-hover:text-green-700 transition-colors duration-150">{{.Title}}</span>
    <time class="ml-2 text-sm text-slate-400">{{.PublishedStr}}</time>
  </a>
</li>
{{end}}
