{{define "postEntry"}}
<div class="my-2">
  <div class="w-auto">
    <p class="font-bold text-2xl">
      <a href="{{if .PostType}}/notion/posts/{{.Slug}}?type={{.PostType}}{{else}}/notion/posts/{{.Slug}}{{end}}" class="inline">{{.Title}}</a>
    </p>
    <p>{{.CreatedTime}}</p>
  </div>
</div>
{{end}}
