<ul class="my-5 list-disc pl-6 text-slate-700">
  <li class="my-2 leading-8">
    {{if .LinkURL}}
    <a
      class="break-words text-sky-600 underline decoration-sky-300 underline-offset-4 transition-colors hover:text-sky-700"
      href="{{.LinkURL}}"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span>{{.Content}}</span>
    </a>
    {{else}}
    {{.Content}}
    {{end}}
  </li>
</ul>
