{{define "content"}}
<section class="page-shell">
    <div class="mb-6">
        <p class="page-kicker">Running</p>
        <h1 class="page-title">Activity heatmap</h1>
        <p class="page-subtitle">
            Data powered by
            <a href="https://www.strava.com/dashboard" target="_blank" rel="noopener noreferrer" class="text-sky-700 underline decoration-sky-300 underline-offset-2 hover:text-sky-800">Strava</a>.
        </p>
    </div>
<div class="panel-surface">
    <div id="heatmap" class="flex w-full flex-col"></div>

    <div class="mt-4 flex items-center gap-2 text-xs text-slate-600">
        <span>Less</span>
        <div class="w-3 h-3 rounded-sm bg-activity-0"></div>
        <div class="w-3 h-3 rounded-sm bg-activity-1"></div>
        <div class="w-3 h-3 rounded-sm bg-activity-2"></div>
        <div class="w-3 h-3 rounded-sm bg-activity-3"></div>
        <div class="w-3 h-3 rounded-sm bg-activity-4"></div>
        <span>More</span>
    </div>
</div>
<div id="tooltip" class="hidden absolute bg-gray-800 text-white px-3 py-2 rounded-md text-xs pointer-events-none"></div>
</section>

<script>
    const activities = {{.Activities}};

    function processActivities(activities) {
        const activityMap = new Map();
        activities.forEach(activity => {    
            const date = activity.start_date_local.split('T')[0];
            const existing = activityMap.get(date) || 0;
            activityMap.set(date, existing + activity.distance);
        });
        return activityMap;
    }

    function getIntensityColor(value, max) {
        if (value === 0) return 'bg-activity-0';
        const normalized = value / max;
        if (normalized <= 0.25) return 'bg-activity-1';
        if (normalized <= 0.5) return 'bg-activity-2';
        if (normalized <= 0.75) return 'bg-activity-3';
        return 'bg-activity-4';
    }

    function createHeatmap() {
        console.log('Creating heatmap');

        const heatmapElement = document.getElementById('heatmap');
        if (!heatmapElement) {
            console.error('Heatmap element not found');
            return;
        }

        // Clear existing content
        heatmapElement.innerHTML = '';

        const activityMap = processActivities(activities);
        const max = Math.max(...Array.from(activityMap.values()));

        const today = new Date();
        const startDate = new Date(today.getFullYear(), 0, 1); // January 1st of current year

        const cols = 52;
        const rows = 7;
        const containerWidth = heatmapElement.clientWidth || heatmapElement.parentElement.clientWidth;
        const gapPx = 2;
        const cellSizePx = Math.max(3, Math.floor((containerWidth - ((cols - 1) * gapPx)) / cols));

        const grid = [];
        for (let row = 0; row < rows; row++) {
            grid[row] = [];
            for (let col = 0; col < cols; col++) {
                const currentDate = new Date(startDate);
                currentDate.setDate(currentDate.getDate() + (col * 7) + row);
                const dateStr = currentDate.toISOString().split('T')[0];
                const value = activityMap.get(dateStr) || 0;
                grid[row][col] = { date: dateStr, value };
            }
        }

        grid.forEach(row => {
            const rowElement = document.createElement('div');
            rowElement.className = 'flex';
            rowElement.style.gap = `${gapPx}px`;
            rowElement.style.marginBottom = `${gapPx}px`;

            row.forEach(cell => {
                const cellElement = document.createElement('div');
                cellElement.className = `${getIntensityColor(cell.value, max)} rounded-sm transition-colors duration-200 hover:ring-2 hover:ring-gray-400 cursor-pointer`;
                cellElement.style.width = `${cellSizePx}px`;
                cellElement.style.height = `${cellSizePx}px`;

                cellElement.addEventListener('mouseover', (e) => {
                    const tooltip = document.getElementById('tooltip');
                    tooltip.classList.remove('hidden');
                    tooltip.classList.add('block');
                    tooltip.style.left = e.pageX + 10 + 'px';
                    tooltip.style.top = e.pageY + 10 + 'px';

                    const date = new Date(cell.date);
                    const formattedDate = date.toLocaleDateString('en-US', {
                        weekday: 'short',
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });

                    tooltip.textContent = `${formattedDate}: ${(cell.value / 1000).toFixed(2)}km`;
                });

                cellElement.addEventListener('mouseout', () => {
                    const tooltip = document.getElementById('tooltip');
                    tooltip.classList.remove('block');
                    tooltip.classList.add('hidden');
                });

                rowElement.appendChild(cellElement);
            });

            heatmapElement.appendChild(rowElement);
        });
    }
    // Initialize heatmap
    document.addEventListener('DOMContentLoaded', function () {
        createHeatmap();

        let resizeTimeout;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(createHeatmap, 120);
        });
    });
</script>
{{end}}
