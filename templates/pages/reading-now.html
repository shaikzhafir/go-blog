{{define "content"}}
<section class="page-shell">
    <div class="mb-8">
        <p class="page-kicker">Reading now</p>
    </div>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
        {{range .Books}}
        <article class="group overflow-hidden rounded-2xl border border-slate-300/80 bg-gradient-to-br from-amber-50/80 via-white to-amber-100/60 shadow-sm transition-all duration-200 hover:-translate-y-1 hover:shadow-md">
            <div class="flex">
                <div class="w-1.5 shrink-0 bg-gradient-to-b from-amber-800/50 via-amber-700/40 to-amber-900/50"></div>
                <div class="flex w-full flex-col gap-4 p-5">
                    <div class="flex gap-4">
                        <img
                            src="{{.ImageURL}}"
                            alt="{{.Title}} cover"
                            class="h-40 w-28 shrink-0 rounded-md border border-slate-300 object-cover shadow-sm"
                        />
                        <div class="min-w-0">
                            <p class="text-xl font-semibold leading-tight text-slate-900">{{.Title}}</p>
                            <p class="mt-2 text-sm text-slate-600">by {{.Author}}</p>
                        </div>
                    </div>

                    <div>
                        <div class="mb-1 flex items-center justify-between text-sm">
                            <span class="text-slate-600">Progress</span>
                            <span class="font-medium text-slate-800">{{.Progress}}%</span>
                        </div>
                        <progress max="100" value="{{.Progress}}" class="h-2 w-full accent-emerald-600"></progress>
                    </div>

                    <blockquote class="rounded-lg border border-slate-200 bg-white/70 px-3 py-2 text-sm leading-6 text-slate-700">
                        {{if .Comments}}"{{.Comments}}"{{else}}No notes yet.{{end}}
                    </blockquote>
                </div>
            </div>
        </article>
        {{end}}
    </div>
</section>
{{end}}
