{{define "content"}}
<section class="page-shell">
    <div class="mb-10">
        <h1 class="font-display text-3xl font-bold tracking-tight text-ink md:text-4xl">Currently reading</h1>
        <p class="mt-2 text-ink-light">What I'm reading right now.</p>
    </div>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
        {{range .Books}}
        <article class="flex gap-5 rounded-lg border border-cream-300 bg-cream-50 p-5">
            <img
                src="{{.ImageURL}}"
                alt="Cover of {{.Title}}"
                loading="lazy"
                decoding="async"
                width="96"
                height="144"
                class="h-36 w-24 shrink-0 rounded border border-cream-300 object-cover"
            />
            <div class="min-w-0 flex-1">
                <p class="font-display text-lg font-semibold leading-tight text-ink">{{.Title}}</p>
                <p class="mt-1 text-sm text-ink-light">{{.Author}}</p>

                <div class="mt-3">
                    <div class="mb-1 flex items-center justify-between text-xs text-ink-muted">
                        <span>Progress</span>
                        <span class="font-medium text-ink-light">{{.Progress}}%</span>
                    </div>
                    <div class="h-1.5 w-full rounded-full bg-cream-300">
                        <div class="h-1.5 rounded-full bg-terra" style="width: {{.Progress}}%"></div>
                    </div>
                </div>

                {{if .Comments}}
                <p class="mt-3 text-sm italic leading-relaxed text-ink-light">"{{.Comments}}"</p>
                {{end}}
            </div>
        </article>
        {{end}}
    </div>
</section>
{{end}}
