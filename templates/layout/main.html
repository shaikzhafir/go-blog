<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <script defer src="/static/vendor/htmx.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400&display=swap" rel="stylesheet" />
    <link href="/static/output.css" type="text/css" rel="stylesheet" />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
  />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    function highlightCode(root) {
      if (!window.hljs) return;
      var scope = root && root.querySelectorAll ? root : document;
      var blocks = scope.querySelectorAll("pre code");
      blocks.forEach(function (block) {
        hljs.highlightElement(block);
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      highlightCode(document);
    });

    document.addEventListener("htmx:afterSwap", function (event) {
      var root = event && event.detail ? event.detail.elt : null;
      highlightCode(root);
    });
  </script>
    <meta name="description" content="Personal blog by szhafir — books, coding, travel, and running." />
    <meta property="og:title" content="szhafir" />
    <meta property="og:description" content="Personal blog by szhafir — books, coding, travel, and running." />

</head>

<body class="bg-cream-100 text-ink">
    <div class="min-h-screen">
        <header class="border-b border-cream-300">
            <div class="mx-auto max-w-3xl px-5 py-6 md:px-8">
                <div class="flex items-baseline gap-6">
                    <a

                        class="font-display text-lg md:text-xl font-semibold text-terra hover:text-terra-dark transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-terra-dark after:transition-all after:content-['']"
                    >
                        szhafir
                    </a>
                    <nav class="flex gap-5">
                        <a
                            data-nav
                            href="/notion/book-reviews"
                            class="font-display text-sm md:text-base font-medium text-ink-light hover:text-ink transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-ink after:transition-all after:content-['']"
                        >
                            books
                        </a>
                        <a
                            data-nav
                            href="/notion/engineering"
                            class="font-display text-sm md:text-base font-medium text-ink-light hover:text-ink transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-ink after:transition-all after:content-['']"
                        >

                        </a>
                        <a
                            data-nav
                            href="/notion/travel"
                            class="font-display text-sm md:text-base font-medium text-ink-light hover:text-ink transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-ink after:transition-all after:content-['']"
                        >
                            travel
                        </a>
                        <a
                            data-nav
                            href="/strava"
                            class="font-display text-sm md:text-base font-medium text-ink-light hover:text-ink transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-ink after:transition-all after:content-['']"
                        >
                            strava
                        </a>
                    </nav>
                </div>
            </div>
        </header>
        <script>
            (function () {
                var path = window.location.pathname;
                var links = document.querySelectorAll("[data-nav]");
                var hasMatch = false;

                links.forEach(function (link) {
                    var href = link.getAttribute("href");
                    if (href !== "/" && path.startsWith(href)) {
                        link.setAttribute("data-active", "true");
                        hasMatch = true;
                    }
                });

                if (!hasMatch && path === "/") {
                    var homeLink = document.querySelector('[data-nav][href="/"]');
                    if (homeLink) {
                        homeLink.setAttribute("data-active", "true");
                    }
                }
            })();
        </script>
        <main class="mx-auto max-w-3xl px-5 py-12 md:px-8">
            {{template "content" .}}
        </main>

        <footer class="border-t border-cream-300 py-8 text-center text-xs text-ink-muted">
            <p>© <script>document.write(new Date().getFullYear())</script> szhafir</p>
        </footer>
    </div>
</body>
</html>
