{{define "main"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="/static/vendor/htmx.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="/static/output.css" type="text/css" rel="stylesheet" />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css"
  />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    function highlightCode(root) {
      if (!window.hljs) return;
      var scope = root && root.querySelectorAll ? root : document;
      var blocks = scope.querySelectorAll("pre code");
      blocks.forEach(function (block) {
        hljs.highlightElement(block);
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      highlightCode(document);
    });

    document.addEventListener("htmx:afterSwap", function (event) {
      var root = event && event.detail ? event.detail.elt : null;
      highlightCode(root);
    });
  </script>
    <title>szhafir's blog</title>
</head>

<body>
    <div class="min-h-screen">
        <header class="border-b border-slate-400/40 bg-slate-300">
            <div class="mx-auto max-w-5xl px-5 py-6 md:px-8 lg:px-12">
                <div class="flex items-baseline gap-6">
                    <a
                        data-nav
                        href="/"
                        class="text-lg md:text-xl font-semibold text-green-700 hover:text-green-900 transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-green-900 after:transition-all after:content-['']"
                    >
                        home
                    </a>
                    <nav class="flex gap-5">
                        <a
                            data-nav
                            href="/notion/book-reviews"
                            class="text-sm md:text-base font-medium text-gray-500 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                        >
                            books
                        </a>
                        <a
                            data-nav
                            href="/notion/engineering"
                            class="text-sm md:text-base font-medium text-gray-500 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                        >
                            coding
                        </a>
                        <a
                            data-nav
                            href="/notion/travel"
                            class="text-sm md:text-base font-medium text-gray-500 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                        >
                            travel
                        </a>
                        <a
                            data-nav
                            href="/strava"
                            class="text-sm md:text-base font-medium text-gray-500 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-[-2px] after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                        >
                            strava
                        </a>
                    </nav>
                </div>
            </div>
        </header>
        <script>
            (function () {
                var path = window.location.pathname;
                var links = document.querySelectorAll("[data-nav]");
                var hasMatch = false;

                links.forEach(function (link) {
                    var href = link.getAttribute("href");
                    if (href !== "/" && path.startsWith(href)) {
                        link.setAttribute("data-active", "true");
                        hasMatch = true;
                    }
                });

                if (!hasMatch && path === "/") {
                    var homeLink = document.querySelector('[data-nav][href="/"]');
                    if (homeLink) {
                        homeLink.setAttribute("data-active", "true");
                    }
                }
            })();
        </script>
        <main class="mx-auto max-w-5xl px-5 py-12 md:px-8 lg:px-12">
            {{template "content" .}}
        </main>

        <footer class="border-t border-slate-400/40 py-8 text-center text-xs text-slate-500">
            <p>© <script>document.write(new Date().getFullYear())</script> szhafir</p>
            <p class="mt-1">Site powered by htmx, tailwind and go, content from Notion</p>
        </footer>
    </div>
</body>
</html>
{{end}}
