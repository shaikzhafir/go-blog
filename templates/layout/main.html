{{define "main"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/htmx.org/dist/htmx.js"></script>
    <link href="/static/output.css" type="text/css" rel="stylesheet" />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    // Handle the htmx afterRequest event to load highlight.js
    document.addEventListener("htmx:afterRequest", function (event) {
      hljs.highlightAll();
    });
  </script>
    <title>szhafir's blog</title>
</head>

<body>
    <div class="py-20 mx-5 xl:mx-56 bg-slate-300 mb-10 font-geist">
        <div class="flex items-baseline gap-4 mb-5">
            <a
                data-nav
                href="/"
                class="text-md md:text-2xl text-green-700 hover:text-green-900 transition-colors duration-200 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-green-900 after:transition-all after:content-['']"
            >
                home
            </a>
            <nav class="flex gap-6 p-4">
                <a
                    data-nav
                    href="/notion/book-reviews"
                    class="text-md md:text-2xl font-medium text-gray-600 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                >
                    books
                </a>
                <a
                    data-nav
                    href="/notion/engineering"
                    class="text-md md:text-2xl font-medium text-gray-600 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                >
                    coding
                </a>
                <a
                    data-nav
                    href="/strava"
                    class="text-md md:text-2xl font-medium text-gray-600 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                >
                    strava
                </a>
                <a
                    data-nav
                    href="/manga"
                    class="text-md md:text-2xl font-medium text-gray-600 hover:text-gray-900 transition-colors duration-200 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 hover:after:w-full data-[active=true]:after:w-full after:bg-gray-900 after:transition-all after:content-['']"
                >
                    manga
                </a>
            </nav>
        </div>
        <script>
            (function () {
                var path = window.location.pathname;
                var links = document.querySelectorAll("[data-nav]");
                var hasMatch = false;

                links.forEach(function (link) {
                    var href = link.getAttribute("href");
                    if (href !== "/" && path.startsWith(href)) {
                        link.setAttribute("data-active", "true");
                        hasMatch = true;
                    }
                });

                if (!hasMatch && path === "/") {
                    var homeLink = document.querySelector('[data-nav][href="/"]');
                    if (homeLink) {
                        homeLink.setAttribute("data-active", "true");
                    }
                }
            })();
        </script>
        {{template "content" .}}
    </div>
    <footer class="text-center text-xs pb-5">
        <p>© <script>document.write(new Date().getFullYear())</script> szhafir</p>
        <p>Site powered by htmx, tailwind and go, content from Notion</p>
    </footer>
</body>
</html>
{{end}}
